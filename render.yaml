services:
  # --- Backend (FastAPI) ---
  - type: web
    name: hotel-pos-backend
    runtime: python
    rootDir: backend
    buildCommand: ./render-build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-pos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_NAME
        value: "Hotel POS Production"
      - key: PYTHON_VERSION
        value: 3.9.0

  # --- Frontend (Next.js) ---
  - type: web
    name: hotel-pos-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        # IMPORTANT: Replace this with your actual Render backend URL after the first deploy
        # Example: https://hotel-pos-backend.onrender.com/api/v1
        value: "REPLACE_WITH_YOUR_BACKEND_URL/api/v1"

databases:
  - name: hotel-pos-db
    plan: free
